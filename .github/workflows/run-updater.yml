name: Cloudflare Gateway Adblock Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: 'SeriousHoax/Cloudflare-Gateway-Adblock-Updater'
          ref: 'main'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Tools
        run: pip install requests aiohttp

      - name: Patch Precedence and Run
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cat << 'EOF' > patch.py
          import json
          orig_dumps = json.dumps
          def fix_precedence(obj):
              if isinstance(obj, dict):
                  if "precedence" in obj:
                      obj["precedence"] = 10000
                  for k, v in obj.items():
                      fix_precedence(v)
              elif isinstance(obj, list):
                  for item in obj:
                      fix_precedence(item)

          def custom_dumps(obj, *args, **kwargs):
              try:
                  fix_precedence(obj)
              except Exception:
                  pass
              return orig_dumps(obj, *args, **kwargs)
          json.dumps = custom_dumps
          EOF
          cat update_gateway.py >> patch.py
          mv patch.py update_gateway.py
          python update_gateway.py
