name: Cloudflare Gateway Adblock Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Your Config
        uses: actions/checkout@v4
        with:
          path: 'my-repo'

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          repository: 'SeriousHoax/Cloudflare-Gateway-Adblock-Updater'
          ref: 'main'
          path: 'src'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Tools
        run: pip install requests aiohttp

      - name: Move Config and Run
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cp my-repo/config.json src/config.json
          cd src
          python update_gateway.py
